<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA + A-DSA 3-Month Roadmap</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f4f9;
      color: #333;
      line-height: 1.6;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1, h2 {
      color: #222;
    }
    .progress-container {
      background: #e8f0fe;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 20px;
      background-color: #e0e0e0;
      border-radius: 10px;
      margin: 10px 0;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background-color: #4caf50;
      border-radius: 10px;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-controls {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    .progress-controls button {
      padding: 5px 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .week {
      margin-bottom: 30px;
      padding: 15px;
      border-left: 5px solid #007BFF;
      background: #f9f9f9;
      border-radius: 5px;
    }
    ul.progress-list {
      list-style-type: none;
      padding: 0;
    }
    ul.progress-list li {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }
    .progress-text {
      margin-left: 5px;
      color: #4caf50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 3-Month DSA + A-DSA Roadmap</h1>
    
    <div class="progress-container">
      <h3>Your Progress</h3>
      <div class="progress-bar">
        <div class="progress-bar-inner" id="progress-bar"></div>
      </div>
      <p>Completed: <span class="progress-percentage">0/65 (0%)</span></p>
      <div class="progress-controls">
        <button onclick="saveProgress()">💾 Save Progress</button>
        <button onclick="loadProgress()">🔄 Load Progress</button>
      </div>
    </div>
    
    <h2 class="progress-heading">Weekly Progress</h2>
    <ul class="progress-list">
      <li>
        <input type="checkbox" disabled> Week 1: Arrays & Hashing <span class="progress-text">(0/5)</span>
      </li>
      <!-- Add list items for all 13 weeks -->
    </ul>
    
    <h2>📅 Week 1: Arrays & Hashing</h2>
    <ul>
      <li><input type="checkbox" id="task-1"> <a href="https://leetcode.com/problems/two-sum/" target="_blank">Two Sum</a></li>
      <li><input type="checkbox" id="task-2"> <a href="https://leetcode.com/problems/group-anagrams/" target="_blank">Group Anagrams</a></li>
      <li><input type="checkbox" id="task-3"> <a href="https://leetcode.com/problems/contains-duplicate/" target="_blank">Contains Duplicate</a></li>
      <li><input type="checkbox" id="task-4"> <a href="https://leetcode.com/problems/maximum-subarray/" target="_blank">Maximum Subarray</a></li>
      <li><input type="checkbox" id="task-5"> <a href="https://leetcode.com/problems/product-of-array-except-self/" target="_blank">Product of Array Except Self</a></li>
    </ul>
    
    <!-- Add all remaining weeks and tasks -->
  </div>

  <script>
    // Paste the progress tracking script here
    function updateProgressCount() {
      // Get all sections (weeks)
      const weeks = document.querySelectorAll('h2:not(.progress-heading)');
      
      // Process each week
      weeks.forEach((week, index) => {
        // Find the matching progress item
        const progressItem = document.querySelector(`.progress-list li:nth-child(${index + 1})`);
        if (!progressItem) return;
        
        // Get all checkboxes in this section until the next h2
        let checkboxes = [];
        let currentElement = week.nextElementSibling;
        
        while (currentElement && currentElement.tagName !== 'H2') {
          if (currentElement.tagName === 'UL') {
            const items = currentElement.querySelectorAll('li input[type="checkbox"]');
            checkboxes = [...checkboxes, ...items];
          }
          currentElement = currentElement.nextElementSibling;
        }
        
        // Count completed items
        const completed = [...checkboxes].filter(cb => cb.checked).length;
        const total = checkboxes.length;
        
        // Update the progress text
        const progressText = progressItem.querySelector('.progress-text');
        if (progressText) {
          progressText.textContent = `(${completed}/${total})`;
        }
        
        // Update the checkbox if all items are completed
        const progressCheckbox = progressItem.querySelector('input[type="checkbox"]');
        if (progressCheckbox) {
          progressCheckbox.checked = completed === total && total > 0;
        }
      });
      
      // Update overall progress
      const allCheckboxes = document.querySelectorAll('ul:not(.progress-list) li input[type="checkbox"]');
      const totalCompleted = [...allCheckboxes].filter(cb => cb.checked).length;
      const totalItems = allCheckboxes.length;
      const percentage = Math.round((totalCompleted / totalItems) * 100) || 0;
      
      const progressBar = document.querySelector('.progress-bar-inner');
      const progressText = document.querySelector('.progress-percentage');
      
      if (progressBar) {
        progressBar.style.width = `${percentage}%`;
      }
      
      if (progressText) {
        progressText.textContent = `${totalCompleted}/${totalItems} (${percentage}%)`;
      }
    }

    // Add event listeners to all checkboxes
    document.addEventListener('DOMContentLoaded', () => {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', updateProgressCount);
      });
      
      // Initial update
      updateProgressCount();
    });

    // Enable local storage for saving progress
    function saveProgress() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const progress = {};
      
      checkboxes.forEach((checkbox, index) => {
        progress[index] = checkbox.checked;
      });
      
      localStorage.setItem('dsaRoadmapProgress', JSON.stringify(progress));
      alert('Progress saved!');
    }

    function loadProgress() {
      const saved = localStorage.getItem('dsaRoadmapProgress');
      if (saved) {
        const progress = JSON.parse(saved);
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        
        Object.keys(progress).forEach(index => {
          if (checkboxes[index]) {
            checkboxes[index].checked = progress[index];
          }
        });
        
        updateProgressCount();
      }
    }

    // Load saved progress on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadProgress();
    });
  </script>
</body>
</html>
